services:
  app:
    image: zro-app
    build:
      context: .
      target: production
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_STRIPE_PUBLIC_KEY: ${NEXT_PUBLIC_STRIPE_PUBLIC_KEY:-}
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL:-https://zro-api.azurewebsites.net}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"
    restart: unless-stopped
